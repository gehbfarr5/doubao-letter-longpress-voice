plugins {
    id "com.android.application"
}

android {
    namespace "com.jin.doubaolongpressvoice"
    compileSdk 36

    defaultConfig {
        applicationId "com.jin.doubaolongpressvoice"
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "1.0.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    // Xposed / LSPosed API. compileOnly so it is NOT bundled into the APK
    // (the runtime provides it).
    compileOnly files("libs/api-82.jar")
}
